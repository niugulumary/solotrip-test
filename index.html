<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>独旅十六型人格测试</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{background:#f5f9f7;color:#333;padding:20px;max-width:720px;margin:0 auto}
        .box{background:#fff;border-radius:18px;padding:30px;box-shadow:0 2px 12px #e2ede8;min-height:90vh}
        .hide{display:none}
        h1{color:#386b59;margin-bottom:12px;font-size:24px}
        .desc{color:#666;margin-bottom:30px;line-height:1.6}
        .q-title{font-size:17px;margin-bottom:20px;min-height:50px}
        .opt{padding:14px 16px;border:1px solid #d9e8e2;border-radius:12px;margin-bottom:12px;cursor:pointer;transition:0.2s}
        .opt:hover{background:#eaf5f1;border-color:#68b89e}
        .btn{background:#489c82;color:white;border:none;border-radius:12px;padding:13px 26px;margin-top:20px;cursor:pointer;font-size:16px}
        .result-card{border:1px solid #cce6dd;border-radius:16px;padding:24px;margin-top:20px;background:#f7fffc}
        .code{font-size:22px;font-weight:bold;color:#397c67;margin-bottom:8px}
        .name{font-size:20px;margin-bottom:10px}
        .progress{color:#888;margin-bottom:15px}
        .res-img{width:260px;height:260px;border-radius:12px;object-fit:cover;margin:10px auto;display:block;border:1px solid #cce6dd}
        .res-text{line-height:1.8;color:#444;margin-top:15px;text-align:justify}
    </style>
</head>
<body>
<div class="box">
    <!--首页-->
    <div id="page-home">
        <h1>独旅十六型人格测试</h1>
        <p class="desc">共30道选择题，根据你的真实旅行习惯选择，答完自动测算四维人格，解锁你的专属独旅类型<br>四大维度：社交(G孤栖/X寻伴)｜规划(M谋定/S随性)｜感知(L落地/Y神游)｜决策(R冷理/W温感)</p>
        <button class="btn" onclick="startTest()">开始测试</button>
    </div>

    <!--答题页-->
    <div id="page-question" class="hide">
        <div class="progress">第<span id="cur">1</span>/30题</div>
        <div class="q-title" id="qtext"></div>
        <div id="opts-box"></div>
    </div>

    <!--结果页（配图+文案）-->
    <div id="page-res" class="hide">
        <h1>你的独旅人格结果</h1>
        <div class="result-card">
            <!--人格图片位：本地png替换src即可-->
            <img class="res-img" id="person-img" src="">
            <div class="code" id="res-code"></div>
            <div class="name" id="res-name"></div>
            <div class="res-text" id="res-desc"></div>
        </div>
        <button class="btn" onclick="restart()">重新测试</button>
    </div>
</div>

//分数容器
let score={G:0,X:0,M:0,S:0,L:0,Y:0,R:0,W:0}
let now=0;

//页面切换
function hideAll(){
    document.getElementById("page-home").classList.add("hide")
    document.getElementById("page-question").classList.add("hide")
    document.getElementById("page-res").classList.add("hide")
}
function startTest(){
    hideAll()
    document.getElementById("page-question").classList.remove("hide")
    renderQ()
}
//渲染题目
function renderQ(){
    const item=questionList[now]
    document.getElementById("cur").innerText=now+1
    document.getElementById("qtext").innerText=item.q
    let html=""
    item.opt.forEach((o,i)=>{
        html+=`<div class="opt" onclick="selectOpt(${i})">${o}</div>`
    })
    document.getElementById("opts-box").innerHTML=html
}
//选择选项加分
function selectOpt(idx){
    const sStr=questionList[now].score[idx]
    let [key,val]=sStr.split(":")
    score[key]+=Number(val)
    now++
    if(now>=questionList.length){
        calcResult()
        return
    }
    renderQ()
}
//计算结果+渲染名称/文案/图片
function calcResult(){
    hideAll()
    document.getElementById("page-res").classList.remove("hide")
    //四维判定
    let gx=score.G>score.X?"G":"X"
    let ms=score.M>score.S?"M":"S"
    let ly=score.L>score.Y?"L":"Y"
    let rw=score.R>score.W?"R":"W"
    let code=gx+ms+ly+rw
    let info=personInfo[code]
    //填充页面数据
    document.getElementById("res-code").innerText=code
    document.getElementById("res-name").innerText=info.name
    document.getElementById("res-desc").innerText=info.desc
    document.getElementById("person-img").src=info.img
}
//重置测试
function restart(){
